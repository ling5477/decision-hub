services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: decision_hub
      POSTGRES_USER: decision_hub
      POSTGRES_PASSWORD: decision_hub
    ports:
      - "5432:5432"
    volumes:
      - dh_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - dh_redis:/data

volumes:
  dh_pg:
  dh_redis:

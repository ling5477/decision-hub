openapi: 3.0.3
info:
  title: decision-hub
  version: 0.1.0
  description: |
    Decision Hub OpenAPI 契约（Stage2-PoC FREEZE + Stage3-B1 Contract Alignment）。

    本规约只描述 DH 仓库内已实现 / 计划中的契约口径，不代表 DH 接管任何交易能力。

    - Stage2-PoC-B2 已实现：POST /api/ai/feedback/nq（NQ -> DH 正式回流事件 ingest）。
    - Stage3-B1 仅做契约对齐：补充描述、对齐 contracts/json-schema/*.schema.json、
      明确 NQ 侧未来 endpoint 期望（不在本仓库新增 path，不实现真实联调）。

    硬边界（OpenAPI 与代码同步遵守）：
      不出现 /orders / /trades / /live API 路径；
      不出现下单 / 绕风控类危险语义（详见 contracts 黑名单扫描）；
      不引入新事件类型（NqFeedbackEventType 保持 8 种）；
      不修改已落地 endpoint 语义；JudgeDecision 仍是 DH 唯一最终出口。
paths:
  /_ping:
    get:
      summary: ping
      responses:
        '200':
          description: ok
  /legacy/runs:
    post:
      summary: '[deprecated Stage1-CLOSE] create run (legacy multi-model platform)'
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCreateRequest'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCreateResponse'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /legacy/runs/{runId}:
    get:
      summary: '[deprecated Stage1-CLOSE] get run (legacy multi-model platform)'
      deprecated: true
      parameters:
        - in: path
          name: runId
          schema: { type: string }
          required: true
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetailResponse'
        '404':
          description: run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== Stage2-PoC-B2: NQ -> DH feedback ingestion (implemented) =====
  /api/ai/feedback/nq:
    post:
      summary: 'Stage2-PoC-B2: NQ -> DH 正式回流事件 ingest'
      description: |
        接收 NQ 端推送的 NqFeedbackEnvelope；按 eventId 做幂等去重，重放视作命中。
        - 首次接收：返回 202 + NqFeedbackAcceptedResponse（outcome=ACCEPTED）
        - 幂等命中：返回 202 + NqFeedbackAcceptedResponse（outcome=DUPLICATE）
        - 校验失败：返回 400 + NqFeedbackErrorResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NqFeedbackEnvelope'
      responses:
        '202':
          description: accepted (first receipt) or duplicate (idempotent replay)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NqFeedbackAcceptedResponse'
        '400':
          description: invalid envelope or payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NqFeedbackErrorResponse'

  # ===== Stage2-PoC-B3 / B4 planned endpoints (controllers 留 Batch 后续 / Stage2 VERIFY) =====
  # Schemas (ForecastArtifact / ExternalMarketSnapshot / ReflectionEntry / CheckpointEntry) 已在 components 落地。
  # 此处仅以注释占位，避免 OpenAPI 出现尚未实现的 controller 误导消费方。
  # POST /api/ai/tools/forecast              -> ForecastArtifact
  # POST /api/ai/research/snapshots          -> ExternalMarketSnapshot
  # GET  /api/ai/research/snapshots/{id}     -> ExternalMarketSnapshot
  # GET  /api/ai/research-runs/{runId}/reflections -> ReflectionEntry[]
  # GET  /api/ai/research-runs/{runId}/checkpoints -> CheckpointEntry[]

  # ===== Stage3-B1 planned contract（NQ 侧未来 endpoint，DH 不在本仓库落 path / 不实现真实联调） =====
  # 详见 docs/current/STAGE3_CONTRACT_PLAN.md §2 与 docs/current/STAGE3_DH_TO_NQ_BACKTEST_PLAN.md §2。
  #
  # NQ 端 endpoint (待 NQ 团队确认)：
  #   POST /api/ai/research/backtest-requests
  #     request body:  DhBacktestRequest               (components/schemas)
  #     202 response:  DhBacktestRequestAccepted       (components/schemas)
  #     400 response:  errorCode 之一：INVALID_SYMBOLS / INVALID_DATE_RANGE /
  #                    UNSUPPORTED_FREQUENCY / INVALID_PARAMETERS_JSON /
  #                    QUOTA_EXCEEDED / RISK_GATED
  #     409 response:  同 requestId 重放，DH 视为 idempotent 成功
  #     5xx:            DH 出站 outbox（Stage3-B3 IMPLEMENT 才落地）按 1s/5s/30s/5m/1h 重试
  #
  # 异步回测结果以 BACKTEST_RESULT_READY feedback 事件回传，路径仍走已实现的
  # POST /api/ai/feedback/nq；payload schema 见 contracts/json-schema/nq-feedback-backtest-result-ready.schema.json。
  #
  # 本仓库 Stage3-B1 严格禁止：
  #   - 在 paths 段新增任何 /api/ai/research/backtest-requests / /orders / /trades / /live；
  #   - 出现下单 / 绕风控类危险语义（详见 contracts 黑名单扫描）；
  #   - 修改已落地 endpoint 语义；
  #   - 新增 NqFeedbackEventType（保持 8 种）。

components:
  schemas:
    RunCreateRequest:
      type: object
      required:
        - tenantId
        - question
      properties:
        tenantId:
          type: string
          description: tenant identity
        userId:
          type: string
          description: optional user identity
        question:
          type: string
          description: decision question text
        config:
          type: object
          additionalProperties: true
          description: optional run-time config snapshot
    RunCreateResponse:
      type: object
      required:
        - runId
        - status
      properties:
        runId:
          type: string
        status:
          type: string
          example: CREATED
    RunDetailResponse:
      type: object
      required:
        - runId
        - tenantId
        - status
      properties:
        runId:
          type: string
        tenantId:
          type: string
        userId:
          type: string
        question:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        configSnapshot:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string

    # ===== Stage2-PoC-B1: NQ feedback envelope + 8 payload schemas =====
    # Spec source of truth: contracts/json-schema/nq-feedback-envelope.schema.json
    NqFeedbackEventType:
      type: string
      description: 'Stage2-PoC-B1: 8 种 NQ -> DH 正式事件类型'
      enum:
        - PAPER_RUN_CREATED
        - PAPER_RUN_STARTED
        - PAPER_RUN_STOPPED
        - PAPER_RUN_DAILY_REPORT_GENERATED
        - PAPER_RUN_ALERT_RAISED
        - PAPER_RUN_RECOVERY_EVENT_RECORDED
        - PAPER_RUN_STABILITY_CHECK_COMPLETED
        - BACKTEST_RESULT_READY
    NqFeedbackEnvelope:
      type: object
      description: 'Stage2-PoC-B1: NQ -> DH 回流事件统一信封'
      required:
        - eventId
        - eventType
        - occurredAt
        - sourceSystem
        - sourceJobId
        - traceId
        - requestId
        - correlationId
        - schemaVersion
        - payloadJson
      properties:
        eventId:       { type: string }
        eventType:     { $ref: '#/components/schemas/NqFeedbackEventType' }
        occurredAt:    { type: string, format: date-time }
        sourceSystem:  { type: string, enum: ['nexus-quant'] }
        sourceJobId:   { type: string }
        traceId:       { type: string }
        requestId:     { type: string }
        correlationId: { type: string }
        schemaVersion: { type: string, example: '1.0.0' }
        payloadJson:   { type: string, description: 'raw payload JSON string preserved as-is' }
        receivedAt:    { type: string, format: date-time }
    NqFeedbackAcceptedResponse:
      type: object
      description: 'Stage2-PoC-B2: NQ feedback 接收响应（HTTP 202）。首次接收 outcome=ACCEPTED，幂等重放 outcome=DUPLICATE。'
      required: [eventId, status, outcome]
      properties:
        eventId:       { type: string }
        status:        { type: string, description: '统一保留原 status 字符串，首次与重放语义一致' }
        outcome:       { type: string, enum: [ACCEPTED, DUPLICATE] }
        traceId:       { type: string, nullable: true }
        correlationId: { type: string, nullable: true }
    NqFeedbackErrorResponse:
      type: object
      description: 'Stage2-PoC-B2: NQ feedback 拒绝响应（HTTP 400）。errorCode 取 UNKNOWN_EVENT_TYPE / INVALID_SCHEMA / UNKNOWN_TRACE。'
      required: [error]
      properties:
        error:         { type: string, description: '固定为 INVALID_REQUEST' }
        errorCode:     { type: string, nullable: true, enum: [UNKNOWN_EVENT_TYPE, INVALID_SCHEMA, UNKNOWN_TRACE] }
        message:       { type: string, nullable: true }
        eventId:       { type: string, nullable: true }
        traceId:       { type: string, nullable: true }
        correlationId: { type: string, nullable: true }
    AlertLevel:
      type: string
      enum: [INFO, WARN, ERROR, CRITICAL]
    StabilityCheckResult:
      type: string
      enum: [STABLE, UNSTABLE, INCONCLUSIVE]
    BacktestVerdict:
      type: string
      enum: [PASS, FAIL, MARGINAL]
    PaperRunCreatedPayload:
      type: object
      required: [paperRunId, candidateId, strategyName, requestedBy, createdAt, rawPayloadJson]
      properties:
        paperRunId:     { type: string }
        candidateId:    { type: string }
        strategyName:   { type: string }
        requestedBy:    { type: string }
        createdAt:      { type: string, format: date-time }
        configHash:     { type: string, nullable: true }
        rawPayloadJson: { type: string }
    PaperRunStartedPayload:
      type: object
      required: [paperRunId, startedAt, mode, rawPayloadJson]
      properties:
        paperRunId:     { type: string }
        startedAt:      { type: string, format: date-time }
        mode:           { type: string }
        rawPayloadJson: { type: string }
    PaperRunStoppedPayload:
      type: object
      required: [paperRunId, stoppedAt, reason, rawPayloadJson]
      properties:
        paperRunId:     { type: string }
        stoppedAt:      { type: string, format: date-time }
        reason:         { type: string }
        rawPayloadJson: { type: string }
    PaperRunDailyReportGeneratedPayload:
      type: object
      required: [paperRunId, reportId, reportDate, rawPayloadJson]
      properties:
        paperRunId:     { type: string }
        reportId:       { type: string }
        reportDate:     { type: string, format: date }
        realizedPnl:    { type: number, nullable: true }
        maxDrawdown:    { type: number, nullable: true }
        winRate:        { type: number, nullable: true, minimum: 0.0, maximum: 1.0 }
        rawPayloadJson: { type: string }
    PaperRunAlertRaisedPayload:
      type: object
      required: [paperRunId, alertId, alertLevel, alertCode, message, raisedAt, rawPayloadJson]
      properties:
        paperRunId:     { type: string }
        alertId:        { type: string }
        alertLevel:     { $ref: '#/components/schemas/AlertLevel' }
        alertCode:      { type: string }
        message:        { type: string }
        raisedAt:       { type: string, format: date-time }
        rawPayloadJson: { type: string }
    PaperRunRecoveryEventRecordedPayload:
      type: object
      required: [paperRunId, recoveryEventId, recoveryReason, recoveredAt, rawPayloadJson]
      properties:
        paperRunId:      { type: string }
        recoveryEventId: { type: string }
        recoveryReason:  { type: string }
        recoveredAt:     { type: string, format: date-time }
        rawPayloadJson:  { type: string }
    PaperRunStabilityCheckCompletedPayload:
      type: object
      required: [paperRunId, checkId, result, summary, completedAt, rawPayloadJson]
      properties:
        paperRunId:     { type: string }
        checkId:        { type: string }
        result:         { $ref: '#/components/schemas/StabilityCheckResult' }
        summary:        { type: string }
        completedAt:    { type: string, format: date-time }
        rawPayloadJson: { type: string }
    BacktestResultReadyPayload:
      type: object
      required: [backtestId, requestId, candidateId, periodStart, periodEnd, verdict, readyAt, rawPayloadJson]
      properties:
        backtestId:     { type: string }
        requestId:      { type: string }
        candidateId:    { type: string }
        sharpeRatio:    { type: number, nullable: true }
        maxDrawdown:    { type: number, nullable: true }
        annualReturn:   { type: number, nullable: true }
        winRate:        { type: number, nullable: true, minimum: 0.0, maximum: 1.0 }
        profitFactor:   { type: number, nullable: true }
        periodStart:    { type: string, format: date }
        periodEnd:      { type: string, format: date }
        verdict:        { $ref: '#/components/schemas/BacktestVerdict' }
        readyAt:        { type: string, format: date-time }
        rawPayloadJson: { type: string }

    # ===== Stage2-PoC-B1: DH -> NQ backtest request 契约 =====
    DhBacktestRequestStatus:
      type: string
      enum: [DRAFT, QUEUED, ACCEPTED, REJECTED, RESULT_READY, FAILED]
    BacktestFrequency:
      type: string
      enum: [DAILY, HOURLY, MINUTE]
    DhBacktestRequest:
      type: object
      required:
        - requestId
        - traceId
        - candidateId
        - strategyName
        - strategyVersion
        - strategyParametersJson
        - startDate
        - endDate
        - initialCapital
        - symbols
        - frequency
        - requestedBy
        - requestedAt
        - status
      properties:
        requestId:              { type: string }
        traceId:                { type: string }
        candidateId:            { type: string }
        strategyName:           { type: string }
        strategyVersion:        { type: string }
        strategyParametersJson: { type: string }
        entryRulesRef:          { type: string, nullable: true }
        exitRulesRef:           { type: string, nullable: true }
        startDate:              { type: string, format: date }
        endDate:                { type: string, format: date }
        initialCapital:         { type: number, exclusiveMinimum: 0 }
        symbols:
          type: array
          minItems: 1
          items: { type: string }
        frequency:   { $ref: '#/components/schemas/BacktestFrequency' }
        requestedBy: { type: string }
        requestedAt: { type: string, format: date-time }
        status:      { $ref: '#/components/schemas/DhBacktestRequestStatus' }
    DhBacktestRequestAccepted:
      type: object
      required: [requestId, jobId, status, acceptedAt]
      properties:
        requestId:  { type: string }
        jobId:      { type: string }
        status:     { type: string, enum: [QUEUED, ACCEPTED] }
        acceptedAt: { type: string, format: date-time }
    DhBacktestResultSnapshot:
      type: object
      required: [resultId, requestId, traceId, candidateId, periodStart, periodEnd, verdict, recordedAt, rawPayloadJson]
      properties:
        resultId:       { type: string }
        requestId:      { type: string }
        traceId:        { type: string }
        candidateId:    { type: string }
        sharpeRatio:    { type: number, nullable: true }
        maxDrawdown:    { type: number, nullable: true }
        annualReturn:   { type: number, nullable: true }
        winRate:        { type: number, nullable: true, minimum: 0.0, maximum: 1.0 }
        profitFactor:   { type: number, nullable: true }
        periodStart:    { type: string, format: date }
        periodEnd:      { type: string, format: date }
        verdict:        { $ref: '#/components/schemas/BacktestVerdict' }
        recordedAt:     { type: string, format: date-time }
        rawPayloadJson: { type: string }

    # ===== Stage2-PoC-B1: 工具 artifact 契约 =====
    ForecastTarget:
      type: string
      enum: [PRICE, VOLATILITY, DIRECTION, VOLUME]
    ForecastHorizon:
      type: string
      enum: [D1, D5, D20, D60]
    ForecastArtifactStatus:
      type: string
      enum: [COMPLETED, PENDING, FAILED, TIMEOUT]
    ForecastPoint:
      type: object
      required: [date, value, confidence]
      properties:
        date:       { type: string, format: date }
        value:      { type: number }
        confidence: { type: number, minimum: 0.0, maximum: 1.0 }
    ForecastArtifact:
      type: object
      required: [artifactId, traceId, symbol, horizon, target, predictions, generatedAt, status, rawPayloadJson]
      properties:
        artifactId:     { type: string }
        traceId:        { type: string }
        symbol:         { type: string }
        horizon:        { $ref: '#/components/schemas/ForecastHorizon' }
        target:         { $ref: '#/components/schemas/ForecastTarget' }
        predictions:
          type: array
          items: { $ref: '#/components/schemas/ForecastPoint' }
        modelVersion:   { type: string, nullable: true }
        generatedAt:    { type: string, format: date-time }
        status:         { $ref: '#/components/schemas/ForecastArtifactStatus' }
        rawPayloadJson: { type: string }
    MarketDataSource:
      type: string
      enum: [GLOBAL_STOCK_DATA, INTERNAL_CACHE, FAKE]
    MarketSnapshotStatus:
      type: string
      enum: [COMPLETED, PENDING, FAILED]
    ExternalMarketSnapshot:
      type: object
      required:
        - snapshotId
        - traceId
        - symbols
        - source
        - rangeStart
        - rangeEnd
        - fetchedAt
        - dataJson
        - status
        - rawPayloadJson
      properties:
        snapshotId: { type: string }
        traceId:    { type: string }
        symbols:
          type: array
          minItems: 1
          items: { type: string }
        source:         { $ref: '#/components/schemas/MarketDataSource' }
        rangeStart:     { type: string, format: date }
        rangeEnd:       { type: string, format: date }
        fetchedAt:      { type: string, format: date-time }
        dataJson:       { type: string }
        sourceVersion:  { type: string, nullable: true }
        status:         { $ref: '#/components/schemas/MarketSnapshotStatus' }
        rawPayloadJson: { type: string }
    ReflectionType:
      type: string
      enum: [STEP_REFLECTION, AGENT_REFLECTION, RUN_RETROSPECTIVE]
    ReflectionEntry:
      type: object
      required: [reflectionId, runId, traceId, stepIndex, agentRole, type, content, createdAt]
      properties:
        reflectionId: { type: string }
        runId:        { type: string }
        traceId:      { type: string }
        stepIndex:    { type: integer, minimum: 0 }
        agentRole:    { type: string }
        type:         { $ref: '#/components/schemas/ReflectionType' }
        content:      { type: string }
        createdAt:    { type: string, format: date-time }
        payloadJson:  { type: string, nullable: true }
    CheckpointType:
      type: string
      enum:
        - CANDIDATE_FROZEN
        - JUDGE_DECISION
        - PIVOT_TRIGGERED
        - ABORT_TRIGGERED
        - BACKTEST_REQUESTED
    CheckpointStatus:
      type: string
      enum: [DRAFT, RECORDED, DISCARDED]
    CheckpointEntry:
      type: object
      required: [checkpointId, runId, traceId, checkpointIndex, type, status, snapshotJson, createdAt]
      properties:
        checkpointId:    { type: string }
        runId:           { type: string }
        traceId:         { type: string }
        checkpointIndex: { type: integer, minimum: 0 }
        type:            { $ref: '#/components/schemas/CheckpointType' }
        status:          { $ref: '#/components/schemas/CheckpointStatus' }
        snapshotJson:    { type: string }
        createdAt:       { type: string, format: date-time }
